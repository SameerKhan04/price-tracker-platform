{% extends "base.html" %}
{% block title %}Register — Price Tracker{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Create an account</h1>
    <p class="auth-subtitle">Start tracking product prices today.</p>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="e.g. sameer"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="At least 8 characters"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Repeat your password"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Create Account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
